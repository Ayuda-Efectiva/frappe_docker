# Stack: frappe-staging | frappe-prod
# .env en Vaultwarden

# IMPORTANT!! Folder with "DFP_STACK" value must existe in benches!!
version: '3.8'

services:
  backend:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    deploy:
      update_config:
        parallelism: 1
        delay: 20s
        # La nueva réplica se inicia antes de detener una antigua
        order: start-first
        # Autodispara rollback si hay fallos
        failure_action: rollback
      # Auto (si falla el deploy) o manual
      rollback_config:
        parallelism: 1
        delay: 10s
        # Para primero y luego levanta las nuevas réplicas
        order: stop-first
        # Pausa el rollback, no las instancias que están ejecutándose
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      replicas: 3
      # placement:
      #   constraints:
      #     - node.hostname == ae05
      #   # preferences:
      #   #   - spread: node.labels.geo
    environment:
      - TZ=Europe/Madrid
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        wait-for-it -t 120 mariadb_db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        echo "Initializing backend";
        /home/frappe/frappe-bench/env/bin/gunicorn --chdir=/home/frappe/frappe-bench/sites --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 --preload frappe.app:application;
    # healthcheck:
    #   test: curl -i localhost:8000 || exit 1
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 120s
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
      # Keep some host connection for moving files (backup ones mainly)
      - /tmp:/host-tmp
    networks:
      - default
      - mariadb-net

  frontend:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # depends_on:
    #   - ${DFP_STACK:-frappe-staging}_websocket
    #   - ${DFP_STACK:-frappe-staging}_backend
    # command:
    #   - nginx-entrypoint.sh
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        # wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        wait-for-it -t 120 backend:8000;
        wait-for-it -t 120 websocket:9000;
        echo "Initializing nginx";
        nginx-entrypoint.sh;
    environment:
      BACKEND: ${DFP_STACK:-frappe-staging}_backend:8000
      FRAPPE_SITE_NAME_HEADER: ${DFP_SITE:-staging.ayudaefectiva.org}
      SOCKETIO: ${DFP_STACK:-frappe-staging}_websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      # UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      # X-Real-IP added within Caddy
      UPSTREAM_REAL_IP_HEADER: X-Real-IP
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 900
      CLIENT_MAX_BODY_SIZE: 50m
      TZ: Europe/Madrid
    # healthcheck:
    #   test: curl -i localhost:8080/robots.txt || exit 1
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 120s
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    # ports:
    #   - "8080:8080"
    deploy:
      update_config:
        parallelism: 1
        delay: 20s
        # La nueva réplica se inicia antes de detener una antigua
        order: start-first
        # Autodispara rollback si hay fallos
        failure_action: rollback
      # Auto (si falla el deploy) o manual
      rollback_config:
        parallelism: 1
        delay: 10s
        # Para primero y luego levanta las nuevas réplicas
        order: stop-first
        # Pausa el rollback, no las instancias que están ejecutándose
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      replicas: 3
      # placement:
      #   constraints:
      #     - node.hostname == ae05
    networks:
      - default
      - public-proxy
      - mariadb-net
    # # ONLY FOR DEBUGGING!!!! KEEPS CONTAINER LIVE WITHOUT STARTING NGINX!!!
    # entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]

    # "/home/frappe/frappe-bench/env/bin/gunicorn", \
    # "--chdir=/home/frappe/frappe-bench/sites", \
    # "--bind=0.0.0.0:8000", \
    # "--threads=4", \
    # "--workers=2", \
    # "--worker-class=gthread", \
    # "--worker-tmp-dir=/dev/shm", \
    # "--timeout=120", \
    # "--preload", \
    # "frappe.app:application"

  websocket:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    ports:
      - "9000:9000"
    # depends_on:
    #   - redis-websocket
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      # mode: global
      replicas: 1
      # placement:
      #   constraints:
      #     - node.hostname == ae05
    # command:
    #   - node
    #   - /home/frappe/frappe-bench/apps/frappe/socketio.js
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        echo "Initializing node socketio";
        node /home/frappe/frappe-bench/apps/frappe/socketio.js;
    volumes:
      # - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      # - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    networks:
