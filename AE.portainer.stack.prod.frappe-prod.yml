      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    networks:
      - default
      - mariadb-net

  redis-cache:
    image: redis:7.2.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - /mnt/gluster-disk/benches/${DFP_STACK:-frappe-staging}/redis-cache-data:/data
    # ports:
    #   - "6379:6379"
