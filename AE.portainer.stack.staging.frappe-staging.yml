    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    ports:
      - "8011:9000"
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        echo "Initializing node socketio";
        node /home/frappe/frappe-bench/apps/frappe/socketio.js;
    volumes:
      # - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      # - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    deploy:
      <<: *common-deploy
    networks:
      - default

  queue-long:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        wait-for-it -t 120 backend:8000;
        echo "Initializing bench worker";
        bench worker --queue long,default,short;
    environment:
      - TZ=Europe/Madrid
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    deploy:
      <<: *common-deploy
    networks:
