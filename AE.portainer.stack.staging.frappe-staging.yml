        bench worker --queue short,default;
    environment:
      - TZ=Europe/Madrid
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    deploy:
      <<: *common-deploy
    networks:
      - default
      - mariadb-net

  scheduler:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        wait-for-it -t 120 backend:8000;
        echo "Initializing bench schedule";
        bench schedule;
    environment:
      - TZ=Europe/Madrid
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
    deploy:
      <<: *common-deploy
    networks:
      - default
      - mariadb-net

  redis-cache:
    image: redis:7.2.4-alpine
    command: redis-server --appendonly yes
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    volumes:
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/redis-cache-data:/data
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      <<: *common-deploy
    networks:
      - default

  redis-queue:
    image: redis:7.2.4-alpine
    command: redis-server --appendonly yes
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    volumes:
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/redis-queue-data:/data
    # ports:
