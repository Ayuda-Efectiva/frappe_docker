# Stack: frappe-staging | frappe-prod
# .env en Vaultwarden

# IMPORTANT!! Folder with "DFP_STACK" value must existe in benches!!
version: '3.8'

# frappe-staging_websocket: 35M | cpu 0.2%
# frappe-staging_redis-websocket: 10M | cpu 6%
# frappe-staging_redis-queue: 10M | cpu 6%
# frappe-staging_redis-cache: 30M | cpu 5%
# frappe-staging_scheduler: 100M | cpu 0.5% (sin uso)
# frappe-staging_queue-short: 100M | cpu 0.2% (sin uso)
# frappe-staging_queue-long: 100M | cpu 0.4% (sin uso)
x-common-deploy: &common-deploy
  replicas: 1
  update_config:
    parallelism: 1
    delay: 20s
    # La nueva réplica se inicia antes de detener una antigua
    order: start-first
    # Autodispara rollback si hay fallos
    failure_action: rollback
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 60s
  # Auto (si falla el deploy) o manual
  rollback_config:
    parallelism: 1
    delay: 10s
    # Para primero y luego levanta las nuevas réplicas
    order: stop-first
    # Pausa el rollback, no las instancias que están ejecutándose
    failure_action: pause
  resources:
    limits:
      cpus: '0.6' # Based on VPS cpus: If 8vcpus available, you can set to 4 (half of them)
      memory: 500M
    # reservations:
    #   cpus: '0.5'
    #   memory: 512M

# frappe-staging_frontend: 20M | cpu 3%
# frappe-staging_backend: 330M | cpu 0.2%
x-common-deploy-high-resources: &common-deploy-high-resources
  <<: *common-deploy
  resources:
    limits:
      cpus: '2' # Based on VPS cpus: If 8vcpus available, you can set to 4 (half of them)
      memory: 2G

# x-common-deploy-critical: &common-deploy-critical
#   <<: *common-deploy-high-resources
#   resources:
#     reservations:
#       cpus: '0.5'
#       memory: '0.5G'

services:
  backend:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    environment:
      - TZ=Europe/Madrid
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        wait-for-it -t 120 mariadb_db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        echo "Initializing backend";
        /home/frappe/frappe-bench/env/bin/gunicorn --chdir=/home/frappe/frappe-bench/sites --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 --preload frappe.app:application;
    # healthcheck:
    #   test: curl -i localhost:8000 || exit 1
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 120s
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
      # Keep some host connection for moving files (backup ones mainly)
      - /tmp:/host-tmp
    deploy:
      <<: *common-deploy-high-resources
    networks:
      - default
      - mariadb-net

  frontend:
    # image: frappe/erpnext:v14.62.2
    image: 10.200.200.2:5000/${DFP_IMAGE_VERSION:-frappe-ae:latest}
    # user: "1001:1001" # Use "dockercontainers" UID & GID: (into host: `id dockercontainers`)
    entrypoint:
      - bash
      - -c
    command:
      - |
        echo "Starting...";
        # wait-for-it -t 120 mariadb_db:3306;
        # wait-for-it -t 120 redis-cache:6379;
        # wait-for-it -t 120 redis-queue:6379;
        # wait-for-it -t 120 redis-websocket:6379;
        wait-for-it -t 120 backend:8000;
        wait-for-it -t 120 websocket:9000;
        echo "Initializing nginx";
        nginx-entrypoint.sh;
    environment:
      BACKEND: ${DFP_STACK:-frappe-staging}_backend:8000
      FRAPPE_SITE_NAME_HEADER: ${DFP_SITE:-staging.ayudaefectiva.org}
      SOCKETIO: ${DFP_STACK:-frappe-staging}_websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      # UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      # X-Real-IP added within Caddy
      UPSTREAM_REAL_IP_HEADER: X-Real-IP
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 900
      CLIENT_MAX_BODY_SIZE: 50m
      TZ: Europe/Madrid
    # healthcheck:
    #   test: curl -i localhost:8080/robots.txt || exit 1
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 120s
    volumes:
      - /etc/hostname:/home/frappe/frappe-bench/swarm-hostname:ro
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/logs:/home/frappe/frappe-bench/logs
      - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/sites:/home/frappe/frappe-bench/sites  # Monta el volumen general
      # - /dev/null:/home/frappe/frappe-bench/sites/assets  # Sobrescribe assets/ con "vacío" (la imagen prevalece)
      # - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/nginx/conf.d:/etc/nginx/conf.d
      # - /root/docker_volume_benches/${DFP_STACK:-frappe-staging}/nginx/run:/run
    ports:
      - "8010:8080"
    deploy:
      <<: *common-deploy-high-resources
    networks:
      - default
      - mariadb-net
    # # ONLY FOR DEBUGGING!!!! KEEPS CONTAINER LIVE WITHOUT STARTING NGINX!!!
    # entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]

    # "/home/frappe/frappe-bench/env/bin/gunicorn", \
    # "--chdir=/home/frappe/frappe-bench/sites", \
    # "--bind=0.0.0.0:8000", \
    # "--threads=4", \
    # "--workers=2", \
    # "--worker-class=gthread", \
    # "--worker-tmp-dir=/dev/shm", \
    # "--timeout=120", \
    # "--preload", \
