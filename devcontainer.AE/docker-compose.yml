  #      MP_SMTP_AUTH_ACCEPT_ANY: 1
  #      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  redis-cache:
    image: docker.io/redis:alpine

  redis-queue:
    image: docker.io/redis:alpine

  frappe:
    # user: "1001:1001" # FIX issue with .git issues ??
    # image: docker.io/frappe/bench:latest # DFP
    # If you want to build the current bench image the Containerfile is in this Repo.
    # build: ../images/bench
    build:
      context: .
      dockerfile: AE.bench.Dockerfile
      # args:
      #   HOST_UID: ${UID}
      #   HOST_GID: ${GID}
    command: sleep infinity
    # environment:
    #   - SHELL=/bin/bash
    volumes:
      - ..:/workspace:cached
      # Enable if you require git cloning
      # - ${HOME}/.ssh:/home/frappe/.ssh
      - ${HOME}/.ssh:/home/frappe/.ssh:ro
    working_dir: /workspace/development
    ports:
      # - 8000-8005:8000-8005 # DFP << port multitenancy
      # - 9000-9005:9000-9005 # DFP << port multitenancy
      - 8000:8000
      - 9000:9000
      # # minio # DFP
