services:
  mariadb:
    image: docker.io/mariadb:11.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
      # - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ZERO_DATE,NO_ZERO_IN_DATE,NO_ENGINE_SUBSTITUTION # DFP: Added ONLY_FULL_GROUP_BY!! + NO_ZERO_DATE + NO_ZERO_IN_DATE
      # https://mariadb.com/kb/en/innodb-system-variables/#innodb_log_buffer_size
      # 1GB for innodb
      - --innodb-buffer-pool-size=1073741824
      - --log-bin
      - --log-basename=mariadb
      - --expire-logs-days=15
      # Allow root password change if enabled --skip-grant-tables
      # mysql -u root
      # flush privileges;
      # ALTER USER 'root'@'%'  IDENTIFIED BY 'newpassword';
      # - --skip-grant-tables
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    ports: # DFP: serve it in host localhost:3307 for Dbeaver
      - 3307:3306 # DFP

  # Enable PostgreSQL only if you use it, see development/README.md for more information.
  # postgresql:
  #   image: postgres:14
  #   environment:
  #     POSTGRES_PASSWORD: 123
  #   volumes:
  #     - postgresql-data:/var/lib/postgresql/data

  # Enable Mailpit if you need to test outgoing mail services
  # See https://mailpit.axllent.org/
